<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1A17"/>
      <stop offset="100%" stop-color="#0E0D0C"/>
    </linearGradient>
    <radialGradient id="glowBR" cx="50%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#C9A368" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A368" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bedBR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2620"/>
      <stop offset="100%" stop-color="#16130F"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgBR)"/>
  <rect width="800" height="600" fill="url(#glowBR)"/>

  <!-- headboard -->
  <rect x="220" y="180" width="360" height="160" rx="14" fill="#211D17"/>
  <rect x="220" y="180" width="360" height="160" rx="14" fill="none" stroke="#C9A368" stroke-opacity="0.2" stroke-width="2"/>

  <!-- bed base -->
  <rect x="180" y="330" width="440" height="130" rx="16" fill="url(#bedBR)"/>
  <!-- duvet -->
  <rect x="195" y="350" width="410" height="100" rx="20" fill="#EDE8E0" opacity="0.08"/>
  <!-- pillows -->
  <rect x="225" y="320" width="100" height="55" rx="16" fill="#EDE8E0" opacity="0.12"/>
  <rect x="340" y="320" width="100" height="55" rx="16" fill="#EDE8E0" opacity="0.12"/>
  <rect x="455" y="320" width="100" height="55" rx="16" fill="#EDE8E0" opacity="0.07"/>

  <!-- nightstands -->
  <rect x="115" y="400" width="60" height="60" rx="6" fill="#181510"/>
  <rect x="625" y="400" width="60" height="60" rx="6" fill="#181510"/>

  <!-- lamps -->
  <line x1="145" y1="400" x2="145" y2="365" stroke="#C9A368" stroke-width="2" opacity="0.5"/>
  <ellipse cx="145" cy="358" rx="20" ry="11" fill="#C9A368" opacity="0.3"/>
  <line x1="655" y1="400" x2="655" y2="365" stroke="#C9A368" stroke-width="2" opacity="0.5"/>
  <ellipse cx="655" cy="358" rx="20" ry="11" fill="#C9A368" opacity="0.3"/>

  <!-- window glow -->
  <rect x="660" y="70" width="100" height="180" rx="2" fill="#C9A368" opacity="0.07"/>
  <rect x="660" y="70" width="100" height="180" rx="2" fill="none" stroke="#C9A368" stroke-opacity="0.3" stroke-width="2"/>

  <!-- floor -->
  <line x1="0" y1="470" x2="800" y2="470" stroke="#EDE8E0" stroke-opacity="0.06" stroke-width="1"/>
  <ellipse cx="400" cy="500" rx="260" ry="20" fill="#EDE8E0" opacity="0.03"/>

  <text x="40" y="565" font-family="Georgia, serif" font-size="15" fill="#EDE8E0" opacity="0.35" letter-spacing="2">BEDROOM</text>
</svg>
