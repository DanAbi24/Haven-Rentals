<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgSR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1A17"/>
      <stop offset="100%" stop-color="#0E0D0C"/>
    </linearGradient>
    <radialGradient id="glowSR" cx="78%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#C9A368" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C9A368" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sofaSR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2620"/>
      <stop offset="100%" stop-color="#181510"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgSR)"/>
  <rect width="800" height="600" fill="url(#glowSR)"/>

  <!-- window -->
  <rect x="560" y="60" width="190" height="280" rx="2" fill="#C9A368" opacity="0.08"/>
  <rect x="560" y="60" width="190" height="280" rx="2" fill="none" stroke="#C9A368" stroke-opacity="0.35" stroke-width="2"/>
  <line x1="655" y1="60" x2="655" y2="340" stroke="#C9A368" stroke-opacity="0.25" stroke-width="2"/>
  <line x1="560" y1="200" x2="750" y2="200" stroke="#C9A368" stroke-opacity="0.25" stroke-width="2"/>

  <!-- floor line -->
  <line x1="0" y1="430" x2="800" y2="430" stroke="#EDE8E0" stroke-opacity="0.06" stroke-width="1"/>

  <!-- sofa -->
  <rect x="90" y="330" width="340" height="110" rx="18" fill="url(#sofaSR)"/>
  <rect x="90" y="300" width="340" height="60" rx="22" fill="url(#sofaSR)"/>
  <rect x="75" y="320" width="40" height="120" rx="14" fill="url(#sofaSR)"/>
  <rect x="415" y="320" width="40" height="120" rx="14" fill="url(#sofaSR)"/>
  <rect x="120" y="355" width="80" height="40" rx="8" fill="#0E0D0C" opacity="0.4"/>
  <rect x="220" y="355" width="80" height="40" rx="8" fill="#0E0D0C" opacity="0.4"/>
  <rect x="320" y="355" width="80" height="40" rx="8" fill="#0E0D0C" opacity="0.4"/>

  <!-- coffee table -->
  <rect x="150" y="450" width="180" height="10" rx="3" fill="#8B5A3C" opacity="0.6"/>
  <line x1="165" y1="460" x2="165" y2="500" stroke="#8B5A3C" stroke-width="4" opacity="0.5"/>
  <line x1="315" y1="460" x2="315" y2="500" stroke="#8B5A3C" stroke-width="4" opacity="0.5"/>

  <!-- plant -->
  <ellipse cx="500" cy="425" rx="22" ry="10" fill="#181510"/>
  <path d="M500 420 C480 380 470 340 490 300" stroke="#5A6B4F" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M500 420 C520 370 535 330 515 290" stroke="#5A6B4F" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M500 420 C500 360 500 320 500 270" stroke="#5A6B4F" stroke-width="3" fill="none" opacity="0.7"/>

  <!-- floor lamp -->
  <line x1="630" y1="430" x2="630" y2="250" stroke="#C9A368" stroke-width="2" opacity="0.5"/>
  <ellipse cx="630" cy="240" rx="26" ry="14" fill="#C9A368" opacity="0.25"/>

  <!-- rug -->
  <ellipse cx="260" cy="470" rx="220" ry="22" fill="#EDE8E0" opacity="0.04"/>

  <text x="40" y="565" font-family="Georgia, serif" font-size="15" fill="#EDE8E0" opacity="0.35" letter-spacing="2">SITTING ROOM</text>
</svg>
