<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgKT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1A17"/>
      <stop offset="100%" stop-color="#0E0D0C"/>
    </linearGradient>
    <radialGradient id="glowKT" cx="50%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#C9A368" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C9A368" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="counterKT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E2A22"/>
      <stop offset="100%" stop-color="#16130F"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgKT)"/>
  <rect width="800" height="600" fill="url(#glowKT)"/>

  <!-- upper cabinets -->
  <rect x="80" y="90" width="640" height="100" rx="4" fill="#211D17"/>
  <line x1="240" y1="90" x2="240" y2="190" stroke="#0E0D0C" stroke-width="2"/>
  <line x1="400" y1="90" x2="400" y2="190" stroke="#0E0D0C" stroke-width="2"/>
  <line x1="560" y1="90" x2="560" y2="190" stroke="#0E0D0C" stroke-width="2"/>

  <!-- pendant lights -->
  <line x1="260" y1="60" x2="260" y2="240" stroke="#8B5A3C" stroke-width="2" opacity="0.5"/>
  <ellipse cx="260" cy="248" rx="22" ry="14" fill="#C9A368" opacity="0.35"/>
  <line x1="400" y1="60" x2="400" y2="220" stroke="#8B5A3C" stroke-width="2" opacity="0.5"/>
  <ellipse cx="400" cy="228" rx="22" ry="14" fill="#C9A368" opacity="0.4"/>
  <line x1="540" y1="60" x2="540" y2="240" stroke="#8B5A3C" stroke-width="2" opacity="0.5"/>
  <ellipse cx="540" cy="248" rx="22" ry="14" fill="#C9A368" opacity="0.35"/>

  <!-- island / counter -->
  <rect x="120" y="360" width="560" height="80" rx="8" fill="url(#counterKT)"/>
  <rect x="120" y="350" width="560" height="14" rx="6" fill="#3A352B"/>

  <!-- stools -->
  <rect x="170" y="440" width="14" height="70" rx="4" fill="#181510"/>
  <ellipse cx="177" cy="440" rx="26" ry="9" fill="#211D17"/>
  <rect x="290" y="440" width="14" height="70" rx="4" fill="#181510"/>
  <ellipse cx="297" cy="440" rx="26" ry="9" fill="#211D17"/>
  <rect x="410" y="440" width="14" height="70" rx="4" fill="#181510"/>
  <ellipse cx="417" cy="440" rx="26" ry="9" fill="#211D17"/>

  <!-- window -->
  <rect x="600" y="100" width="100" height="90" rx="2" fill="#C9A368" opacity="0.1"/>

  <line x1="0" y1="520" x2="800" y2="520" stroke="#EDE8E0" stroke-opacity="0.06" stroke-width="1"/>

  <text x="40" y="565" font-family="Georgia, serif" font-size="15" fill="#EDE8E0" opacity="0.35" letter-spacing="2">KITCHEN</text>
</svg>
