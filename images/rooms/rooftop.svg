<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyRF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A1F3A"/>
      <stop offset="50%" stop-color="#1C1430"/>
      <stop offset="100%" stop-color="#0E0D0C"/>
    </linearGradient>
    <radialGradient id="moonRF" cx="80%" cy="18%" r="14%">
      <stop offset="0%" stop-color="#EDE8E0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EDE8E0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#skyRF)"/>
  <circle cx="640" cy="110" r="80" fill="url(#moonRF)"/>
  <circle cx="640" cy="110" r="26" fill="#EDE8E0" opacity="0.85"/>

  <!-- stars -->
  <g fill="#EDE8E0" opacity="0.6">
    <circle cx="100" cy="60" r="1.5"/>
    <circle cx="200" cy="100" r="1.5"/>
    <circle cx="320" cy="50" r="1.5"/>
    <circle cx="450" cy="90" r="1.5"/>
    <circle cx="50" cy="150" r="1.5"/>
    <circle cx="500" cy="40" r="1.5"/>
  </g>

  <!-- distant skyline -->
  <g fill="#0E0D0C" opacity="0.8">
    <rect x="0" y="300" width="50" height="200"/>
    <rect x="60" y="260" width="40" height="240"/>
    <rect x="110" y="320" width="55" height="180"/>
    <rect x="540" y="280" width="45" height="220"/>
    <rect x="600" y="330" width="60" height="170"/>
    <rect x="700" y="290" width="50" height="210"/>
    <rect x="170" y="350" width="350" height="150"/>
  </g>

  <!-- rooftop deck floor -->
  <rect x="0" y="470" width="800" height="130" fill="#15120E"/>

  <!-- low wall -->
  <rect x="0" y="460" width="800" height="20" fill="#1C1812"/>

  <!-- string lights -->
  <path d="M0 430 Q 200 470 400 430 T 800 430" stroke="#C9A368" stroke-opacity="0.35" stroke-width="2" fill="none"/>
  <circle cx="120" cy="445" r="4" fill="#E0C088" opacity="0.8"/>
  <circle cx="280" cy="460" r="4" fill="#E0C088" opacity="0.8"/>
  <circle cx="400" cy="430" r="4" fill="#E0C088" opacity="0.8"/>
  <circle cx="520" cy="460" r="4" fill="#E0C088" opacity="0.8"/>
  <circle cx="680" cy="445" r="4" fill="#E0C088" opacity="0.8"/>

  <!-- lounge chairs -->
  <g fill="#0E0D0C" opacity="0.9">
    <rect x="200" y="500" width="160" height="16" rx="7"/>
    <rect x="200" y="480" width="55" height="20" rx="7"/>
  </g>

  <text x="40" y="565" font-family="Georgia, serif" font-size="15" fill="#EDE8E0" opacity="0.45" letter-spacing="2">ROOFTOP</text>
</svg>
